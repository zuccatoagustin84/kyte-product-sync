name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Disable Vercel GitHub auto-deploy (monorepo)
        run: |
          curl -s -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"commandForIgnoringBuildStep": "exit 0"}' > /dev/null
        env:
          VERCEL_PROJECT_ID: prj_OJ9jim7Xbx2yEvNd8iTMbuQqyfdy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Web to Vercel
        working-directory: ./web
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_4QxOPiKZSoH4D5ue8s893H2w
          VERCEL_PROJECT_ID: prj_OJ9jim7Xbx2yEvNd8iTMbuQqyfdy
